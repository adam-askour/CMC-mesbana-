        <h1>LANDRY / LAVERIE / المغسلة</h1>
        <form>
            <label>Nom :</label>
            <input type="text" name="nom" required>
            <label>Prénom :</label>
            <input type="text" name="prenom" required>
            <label>CIN :</label>
            <input type="text" name="cin" pattern="[A-Z]{2}[0-9]{6}" placeholder="LB123456" required>
            <label>Genre :</label>
            <input type="radio" name="genre" value="Bant" required> Fille
            <input type="radio" name="genre" value="Wald" required> Garçon
            <label>Pôle / Filière :</label>
            <input type="text" name="pole" placeholder="Ex: Informatique" required>
            <label>Téléphone :</label>
            <input type="text" name="tel" pattern="^(06|07)[0-9]{8}$" placeholder="07XXXXXXXX" required>
            <label>Numéro de chambre :</label>
            <input type="number" name="chambre" min="1" max="56" placeholder="Ex:10" required>
            <label>Date :</label>
            <input type="date" name="date" id="date" required>
            <label>Heure :</label>
            <input type="time" name="heure" min="08:30" max="16:00" required>
            <label>Qualité de nettoyage :</label>
            <div class="radio-group">
                <label><input type="radio" name="qualite" value="Haute" required>Produits haute qualité</label>
                <label><input type="radio" name="qualite" value="Moyenne">Produits qualité moyenne</label>
                <label><input type="radio" name="qualite" value="Ordinaire">Produits qualité ordinaire</label>
            </div>
            <label>Services supplémentaires :</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="service" value="Nettoyage">Séchage</label>
                <label><input type="checkbox" name="service" value="Repassage">Repassage</label>
            </div>
            <button onclick="successMessage()">Envoyer</button>
            <p id="msg" style="color:green; display:none;">Opération effectuée avec succès ✔</p>
        </form>
    </div>

    <script>
        let today = new Date().toISOString().split("T")[0];
        document.getElementById("date").setAttribute("min", today);

        function successMessage() {
            document.getElementById("msg").style.display = "block";
        }
    </script>
