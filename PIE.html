<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laverie CMC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        html{
            background-image:url(cmc_tanger.jpg) ;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
         :root {
            --primary-color: #38bdf8;
            --primary-dark: #0ea5e9;
            --secondary-color: #0f172a;
            --accent-color: #1e3a8a;
            --text-light: #f1f5f9;
            --text-gray: #94a3b8;
            --bg-dark: #020617;
            --border-color: rgba(56, 189, 248, 0.3);
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 15px 50px rgba(0, 0, 0, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 12px;
            --font-main: 'Poppins', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-main);
            background: url("background.jpeg") center/cover no-repeat;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            padding: 20px;
        }
        
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }
        
        .contact-info {
            margin: 0 auto 20px auto;
            padding: 25px;
            max-width: 500px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.3), rgba(255, 255, 255, 0.1));
            border-radius: 15px;
            color: #fff;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            font-size: 16px;
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeUp 1s ease;
            margin-left: 80px;
            margin-right: 80px;
        }
        
        .contact-info:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }
        
        .contact-info h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
        }
        
        .contact-info ul {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
        }
        
        .contact-info li {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .contact-info i {
            color: #0ea5e9;
            font-size: 18px;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-container {
            background: rgba(17, 17, 17, 0.98);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            position: relative;
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            animation: fadeIn 0.8s ease-out;
            overflow-y: auto;
            height: 630px;
            margin-left: 80px;
            margin-right: 80px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-container:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: var(--shadow-md);
            border-color: rgba(255, 215, 0, 0.5);
        }
        
        .form-container img.logo {
            display: block;
            margin: 0 auto 20px auto;
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #0ea5e9;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: var(--primary-color);
            letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            position: relative;
            padding-bottom: 15px;
        }
        
        h1:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }
        
        label {
            display: block;
            margin-top: 20px;
            font-size: 15px;
            color: var(--text-gray);
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }
        
        label::before {
            content: '•';
            color: var(--primary-color);
            margin-right: 8px;
            font-weight: bold;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            margin-top: 8px;
            border-radius: var(--border-radius);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 30, 30, 0.8);
            color: var(--text-light);
            font-size: 16px;
            transition: var(--transition);
            font-family: var(--font-main);
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1), 0 0 20px rgba(255, 215, 0, 0.2);
            background: rgba(40, 40, 40, 0.9);
            transform: translateY(-2px);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        input:valid {
            border-color: rgba(46, 204, 113, 0.6);
            background: rgba(46, 204, 113, 0.05);
        }
        
        input:invalid {
            border-color: rgba(231, 76, 60, 0.6);
            background: rgba(231, 76, 60, 0.05);
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        
        input[type="radio"] {
            width: auto;
            margin-right: 8px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            margin-top: 8px;
            gap: 12px;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            border-radius: var(--border-radius);
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.03);
        }
        
        .checkbox-group label:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }
        
        button {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--primary-color), var(--primary-dark));
            color: var(--bg-dark);
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 17px;
            letter-spacing: 0.5px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        
        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
        }
        
        button:active {
            transform: translateY(1px) scale(0.98);
        }
        
        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        button:hover::after {
            left: 100%;
        }
        
        @media (max-width: 480px) {
            .form-container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
        }
        
        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: var(--border-radius);
            margin-top: 20px;
            color: #2ecc71;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-gray);
            opacity: 0.8;
        }
    </style>
</head>

        <h1>LANDRY / LAVERIE / المغسلة</h1>
        <form>
            <label>Nom :</label>
            <input type="text" name="nom" required>
            <label>Prénom :</label>
            <input type="text" name="prenom" required>
            <label>CIN :</label>
            <input type="text" name="cin" pattern="[A-Z]{2}[0-9]{6}" placeholder="LB123456" required>
            <label>Genre :</label>
            <input type="radio" name="genre" value="Bant" required> Fille
            <input type="radio" name="genre" value="Wald" required> Garçon
            <label>Pôle / Filière :</label>
            <input type="text" name="pole" placeholder="Ex: Informatique" required>
            <label>Téléphone :</label>
            <input type="text" name="tel" pattern="^(06|07)[0-9]{8}$" placeholder="07XXXXXXXX" required>
            <label>Numéro de chambre :</label>
            <input type="number" name="chambre" min="1" max="56" placeholder="Ex:10" required>
            <label>Date :</label>
            <input type="date" name="date" id="date" required>
            <label>Heure :</label>
            <input type="time" name="heure" min="08:30" max="16:00" required>
            <label>Qualité de nettoyage :</label>
            <div class="radio-group">
                <label><input type="radio" name="qualite" value="Haute" required>Produits haute qualité</label>
                <label><input type="radio" name="qualite" value="Moyenne">Produits qualité moyenne</label>
                <label><input type="radio" name="qualite" value="Ordinaire">Produits qualité ordinaire</label>
            </div>
            <label>Services supplémentaires :</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="service" value="Nettoyage">Séchage</label>
                <label><input type="checkbox" name="service" value="Repassage">Repassage</label>
            </div>
            <button onclick="successMessage()">Envoyer</button>
            <p id="msg" style="color:green; display:none;">Opération effectuée avec succès ✔</p>
        </form>
    </div>

    <script>
        let today = new Date().toISOString().split("T")[0];
        document.getElementById("date").setAttribute("min", today);

        function successMessage() {
            document.getElementById("msg").style.display = "block";
        }
    </script>
